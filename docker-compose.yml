version: "3.9"

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: dail
      POSTGRES_PASSWORD: dail_secret
      POSTGRES_DB: dail_forge
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dail -d dail_forge"]
      interval: 3s
      retries: 10

  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: "postgresql+asyncpg://dail:dail_secret@db:5432/dail_forge"
      DATABASE_URL_SYNC: "postgresql+psycopg2://dail:dail_secret@db:5432/dail_forge"
      CURATION_API_KEY: "dail-forge-secret-key-change-me"
      # Set to "true" in dev/demo to allow startup even when pipeline has integrity errors
      DAIL_ALLOW_DIRTY_STARTUP: "false"
    volumes:
      - ./data:/mnt/data
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "
        alembic upgrade head &&
        uvicorn api.main:app --host 0.0.0.0 --port 8000 --reload
      "

volumes:
  pgdata:
